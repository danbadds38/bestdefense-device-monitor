name: bestdefense-device-monitor

# Shared build args (context/dockerfile) used by every service.
x-build-args: &build-args
  context: ..
  dockerfile: docker/Dockerfile

# Version metadata forwarded as build args so they are baked into the image ENV.
# Services that run `go build` at container start time read them as $VERSION etc.
x-version-build-args: &version-build-args
  VERSION: ${VERSION:-dev}
  GIT_COMMIT: ${GIT_COMMIT:-unknown}
  BUILD_DATE: ${BUILD_DATE:-unknown}

# All build services write binaries to /out → volume-mapped to ../dist on host.
x-dist-volume: &dist-volume
  - ../dist:/out

services:

  # ── build (legacy, Windows .exe) ───────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build
  build:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=windows GOARCH=amd64 go build -ldflags=\"-s -w -H windowsgui -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-windows-amd64.exe ./cmd/bestdefense-device-monitor && echo Built: && ls -lh /out/bestdefense-device-monitor-windows-amd64.exe"]

  # ── build-windows ──────────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-windows
  build-windows:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=windows GOARCH=amd64 go build -ldflags=\"-s -w -H windowsgui -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-windows-amd64.exe ./cmd/bestdefense-device-monitor && ls -lh /out/bestdefense-device-monitor-windows-amd64.exe"]

  # ── build-darwin-amd64 ─────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-darwin-amd64
  build-darwin-amd64:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=darwin GOARCH=amd64 go build -ldflags=\"-s -w -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-darwin-amd64 ./cmd/bestdefense-device-monitor && ls -lh /out/bestdefense-device-monitor-darwin-amd64"]

  # ── build-darwin-arm64 ─────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-darwin-arm64
  build-darwin-arm64:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=darwin GOARCH=arm64 go build -ldflags=\"-s -w -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-darwin-arm64 ./cmd/bestdefense-device-monitor && ls -lh /out/bestdefense-device-monitor-darwin-arm64"]

  # ── build-linux-amd64 ──────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-linux-amd64
  build-linux-amd64:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=linux GOARCH=amd64 go build -ldflags=\"-s -w -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-linux-amd64 ./cmd/bestdefense-device-monitor && ls -lh /out/bestdefense-device-monitor-linux-amd64"]

  # ── build-linux-arm64 ──────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-linux-arm64
  build-linux-arm64:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command: ["sh", "-c", "GOOS=linux GOARCH=arm64 go build -ldflags=\"-s -w -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE\" -o /out/bestdefense-device-monitor-linux-arm64 ./cmd/bestdefense-device-monitor && ls -lh /out/bestdefense-device-monitor-linux-arm64"]

  # ── build-all ──────────────────────────────────────────────────────────────
  # Builds all 5 platform binaries into dist/ in a single container run.
  # Usage: docker compose -f docker/docker-compose.yml run --rm build-all
  build-all:
    build:
      <<: *build-args
      target: build-env
      args: *version-build-args
    volumes: *dist-volume
    command:
      - sh
      - -c
      - |
        set -e
        LF="-s -w -X main.Version=$$VERSION -X main.BuildCommit=$$GIT_COMMIT -X main.BuildDate=$$BUILD_DATE"
        GOOS=windows GOARCH=amd64 go build -ldflags="$$LF -H windowsgui" -o /out/bestdefense-device-monitor-windows-amd64.exe ./cmd/bestdefense-device-monitor
        GOOS=darwin  GOARCH=amd64 go build -ldflags="$$LF" -o /out/bestdefense-device-monitor-darwin-amd64 ./cmd/bestdefense-device-monitor
        GOOS=darwin  GOARCH=arm64 go build -ldflags="$$LF" -o /out/bestdefense-device-monitor-darwin-arm64 ./cmd/bestdefense-device-monitor
        GOOS=linux   GOARCH=amd64 go build -ldflags="$$LF" -o /out/bestdefense-device-monitor-linux-amd64 ./cmd/bestdefense-device-monitor
        GOOS=linux   GOARCH=arm64 go build -ldflags="$$LF" -o /out/bestdefense-device-monitor-linux-arm64 ./cmd/bestdefense-device-monitor
        echo "build-all: 5 binaries produced:"
        ls -lh /out/

  # ── package-linux ──────────────────────────────────────────────────────────
  # Builds .deb and .rpm from the Linux amd64 binary.
  # Run build-linux-amd64 first, then package-linux.
  # Usage: docker compose -f docker/docker-compose.yml run --rm package-linux
  package-linux:
    build:
      <<: *build-args
      target: package-base
      args: *version-build-args
    volumes: *dist-volume
    command:
      - sh
      - -c
      - |
        set -e
        VER=$$(echo "$$VERSION" | sed 's/^v//')
        [ -z "$$VER" ] && VER="0.0.1"
        fpm -s dir -t deb --name bestdefense-device-monitor --version "$$VER" \
          --architecture amd64 --description "BestDefense device compliance monitor" \
          --maintainer "BestDefense <support@bestdefense.io>" --url "https://bestdefense.io" \
          --license "Proprietary" --prefix /usr/local/bin \
          -p /out/bestdefense-device-monitor_amd64.deb \
          /out/bestdefense-device-monitor-linux-amd64=bestdefense-device-monitor
        fpm -s dir -t rpm --name bestdefense-device-monitor --version "$$VER" \
          --architecture x86_64 --description "BestDefense device compliance monitor" \
          --maintainer "BestDefense <support@bestdefense.io>" --url "https://bestdefense.io" \
          --license "Proprietary" --prefix /usr/local/bin \
          -p /out/bestdefense-device-monitor.x86_64.rpm \
          /out/bestdefense-device-monitor-linux-amd64=bestdefense-device-monitor
        echo "Packages:"; ls -lh /out/*.deb /out/*.rpm

  # ── test ───────────────────────────────────────────────────────────────────
  # Tests run during `docker build` (RUN go test ... layers).
  # The container exits immediately — all work is done by image build time.
  # Usage: docker compose -f docker/docker-compose.yml run --rm test
  test:
    build:
      <<: *build-args
      target: test
    command: ["echo", "Tests passed."]

  # ── vet ────────────────────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm vet
  vet:
    build:
      <<: *build-args
      target: vet
    command: ["echo", "vet: windows passed."]

  # ── vet-all ─────────────────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm vet-all
  vet-all:
    build:
      <<: *build-args
      target: vet-all
    command: ["echo", "vet: all platforms passed."]

  # ── tidy ───────────────────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm tidy
  tidy:
    build:
      <<: *build-args
      target: deps
    volumes:
      - ../go.mod:/src/go.mod
      - ../go.sum:/src/go.sum
    working_dir: /src
    command: ["go", "mod", "tidy"]

  # ── shell ──────────────────────────────────────────────────────────────────
  # Usage: docker compose -f docker/docker-compose.yml run --rm shell
  shell:
    build:
      <<: *build-args
      target: deps
    volumes:
      - ..:/src
    working_dir: /src
    entrypoint: ["sh"]
    stdin_open: true
    tty: true
