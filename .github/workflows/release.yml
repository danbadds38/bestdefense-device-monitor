name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── PR checks: fast Ubuntu runner via Docker ───────────────────────────────
  # Runs vet + cross-compile tests + build on every PR using a Linux container.
  # Much faster and cheaper than windows-latest for basic correctness checks.
  docker-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Vet
        run: make -f docker/Makefile vet

      - name: Test
        run: make -f docker/Makefile test

      - name: Build .exe
        run: make -f docker/Makefile build

      - name: Upload artifact (PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bestdefense-device-monitor-pr-${{ github.event.number }}
          path: dist/bestdefense-device-monitor.exe
          retention-days: 7

  # ── Release: Windows runner for full execution tests + signed release ──────
  # Only runs on version tags. Uses windows-latest so the compiled .exe can
  # actually be executed for integration smoke-testing.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: docker-ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests (native Windows execution)
        run: go test ./...

      - name: Build .exe
        run: |
          $Version = "${{ github.ref_name }}" -replace '^v', ''
          .\scripts\build.ps1 -Version $Version
        shell: pwsh

      - name: Compute SHA256
        run: |
          $hash = (Get-FileHash dist\bestdefense-device-monitor.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  bestdefense-device-monitor.exe" | Out-File -Encoding ASCII dist\bestdefense-device-monitor.exe.sha256
          Write-Host "SHA256: $hash"
        shell: pwsh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bestdefense-device-monitor-windows-amd64
          path: |
            dist/bestdefense-device-monitor.exe
            dist/bestdefense-device-monitor.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bestdefense-device-monitor.exe
            dist/bestdefense-device-monitor.exe.sha256
          body: |
            ## BestDefense Device Monitor ${{ github.ref_name }}

            ### Installation

            1. Download `bestdefense-device-monitor.exe`
            2. Verify the SHA256 hash matches `bestdefense-device-monitor.exe.sha256`
            3. Run as Administrator:
            ```
            .\bestdefense-device-monitor.exe install --key YOUR_REGISTRATION_KEY
            ```

            ### Audit what data is collected (before installing)
            ```
            .\bestdefense-device-monitor.exe check
            ```

            See [DATA_COLLECTED.md](docs/DATA_COLLECTED.md) for a full description of every data point.
